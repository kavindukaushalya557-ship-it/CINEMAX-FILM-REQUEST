<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMAX HD - Movie Requests</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Dark/Light Mode & Theme Accents -->
    <div class="bg-glow-red"></div>
    <div class="bg-glow-gold"></div>

    <div class="container">
        <!-- 1. Hero Section -->
        <header class="hero-section">
            <h1 class="logo">CINEMAX <span>HD</span></h1>
            <p class="subtitle">Request Your Favorite Movies & TV Series</p>
            <a href="#requestForm" class="btn-primary">Request Now</a>
        </header>

        <!-- 2. Movie Request Form (Glassmorphism) -->
        <section id="requestForm" class="glass-panel">
            <h2>Submit a Request</h2>
            <form id="movieForm">
                <div class="input-group">
                    <label>Full Name (Optional)</label>
                    <input type="text" id="fullName" placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label>WhatsApp Number *</label>
                    <input type="text" id="waNumber" required placeholder="07X XXX XXXX">
                </div>
                <div class="input-group">
                    <label>Movie or TV Series Name *</label>
                    <input type="text" id="movieName" required placeholder="e.g. Interstellar">
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Language</label>
                        <select id="language">
                            <option>English</option>
                            <option>Sinhala Dubbed</option>
                            <option>Tamil</option>
                            <option>Hindi</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Release Year</label>
                        <input type="number" id="year" placeholder="e.g. 2014">
                    </div>
                </div>
                <button type="submit" class="btn-submit">Submit Request</button>
                <p id="successMessage" class="hidden">✅ Your request has been successfully submitted. Thank you for supporting CINEMAX HD.</p>
            </form>
        </section>
        
        <!-- Footer -->
        <footer>
            <h3>CINEMAX HD</h3>
            <p>Owner: Mr. Kavindu Kaushalya</p>
            <p>&copy; 2026 CINEMAX HD. All Rights Reserved.</p>
        </footer>
    </div>

    <!-- Firebase SDKs & Custom JS will go here -->
    <script src="app.js"></script>
</body>
</html>
